name: Destroy Homelab Infrastructure

# Tears down billable compute in reverse dependency order:
# compute/vm -> infra/cloudflare.
# infra/storage is never touched (persistent data disk, prevent_destroy).
# infra/network is never touched: the disk lives inside homelab-rg, so the
# RG cannot be destroyed while the disk exists; VNet/subnet/NSG cost nothing.
# infra/dns is never touched either: the zone is a flat ~$0.52/month
# regardless of usage, not worth tearing down every cycle, and destroying it
# breaks infra/cloudflare's and compute/vm's data-source lookups by name
# between deploy cycles (#124).

on:
  workflow_dispatch:
    inputs:
      apply_destroy:
        description: 'IMPORTANT: Whether to actually destroy the resources. Uncheck for a dry run (plan -destroy only).'
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: homelab-terraform

jobs:
  destroy-compute:
    name: Destroy Compute
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: compute/vm
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_dns_zone_name: ${{ secrets.DNS_ZONE_NAME }}
      TF_VAR_dns_rg_name: ${{ secrets.RESOURCE_GROUP_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (Destroy)
        run: terraform plan -destroy -out=tfplan

      - name: Terraform Apply (Destroy)
        if: inputs.apply_destroy == true
        run: terraform apply -auto-approve tfplan

  destroy-cloudflare:
    name: Destroy Cloudflare
    needs: destroy-compute
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/cloudflare
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_azure_dns_zone_name: ${{ secrets.DNS_ZONE_NAME }}
      TF_VAR_azure_rg_name: ${{ secrets.RESOURCE_GROUP_NAME }}
      # Azure credentials needed for data source lookup
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (Destroy)
        run: terraform plan -destroy -out=tfplan

      - name: Terraform Apply (Destroy)
        if: inputs.apply_destroy == true
        run: terraform apply -auto-approve tfplan
