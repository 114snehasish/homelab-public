name: Terraform (reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Path to the Terraform root module (e.g. infra/network)'
        required: true
        type: string
      apply:
        description: 'Apply the plan after it succeeds'
        required: false
        type: boolean
        default: false
      ssh_source_ip:
        description: 'Optional -var=ssh_source_ip=... for the plan (network module only)'
        required: false
        type: string
        default: ''

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    concurrency:
      group: tf-${{ inputs.working_directory }}
      cancel-in-progress: false
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TF_VAR_dns_zone_name: ${{ secrets.DNS_ZONE_NAME }}
      TF_VAR_dns_rg_name: ${{ secrets.RESOURCE_GROUP_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Read pinned Terraform version
        id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}

      - name: Terraform Version
        working-directory: ${{ inputs.working_directory }}
        run: terraform version

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -n "${{ inputs.ssh_source_ip }}" ]; then
            terraform plan -var="ssh_source_ip=${{ inputs.ssh_source_ip }}" -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Terraform Apply
        if: inputs.apply == true
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan
