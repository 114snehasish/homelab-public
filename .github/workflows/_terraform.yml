name: Terraform (reusable)

on:
  workflow_call:
    inputs:
      working_directory:
        description: 'Path to the Terraform root module (e.g. infra/network)'
        required: true
        type: string
      apply:
        description: 'Apply the plan after it succeeds'
        required: false
        type: boolean
        default: false
      ssh_source_ip:
        description: 'Optional -var=ssh_source_ip=... for the plan (network module only)'
        required: false
        type: string
        default: ''

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    concurrency:
      group: tf-${{ inputs.working_directory }}
      cancel-in-progress: false
    env:
      # Serves compute/vm's dns_zone_name/dns_rg_name (self-registered DNS
      # A-record); infra/dns's own dns_zone_name variable happens to share
      # the first name too. Do not remove.
      TF_VAR_dns_zone_name: ${{ secrets.DNS_ZONE_NAME }}
      TF_VAR_dns_rg_name: ${{ secrets.RESOURCE_GROUP_NAME }}
      # infra/cloudflare-only variable names; safe as static env since they
      # don't collide with any variable declared by another module.
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_azure_dns_zone_name: ${{ secrets.DNS_ZONE_NAME }}
      TF_VAR_azure_rg_name: ${{ secrets.RESOURCE_GROUP_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ARM_* auth is set entirely via $GITHUB_ENV, not a static env:
      # entry, so there's exactly one unambiguous source per run instead
      # of a static value that a later override could silently lose to.
      # network/storage/compute use the ARM_* secrets.
      - name: Use ARM_* credentials
        if: inputs.working_directory != 'infra/dns' && inputs.working_directory != 'infra/cloudflare'
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }}" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }}" >> "$GITHUB_ENV"

      # infra/dns and infra/cloudflare authenticate with the AZURE_*
      # secrets instead (retiring that split is tracked separately,
      # E02.4).
      - name: Use AZURE_* credentials for dns/cloudflare
        if: inputs.working_directory == 'infra/dns' || inputs.working_directory == 'infra/cloudflare'
        run: |
          echo "ARM_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> "$GITHUB_ENV"
          echo "ARM_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> "$GITHUB_ENV"

      # infra/dns's rg_name variable collides by name with the rg_name
      # variable declared (same "homelab-rg" default) by infra/network,
      # infra/storage, and compute/vm. A static env: entry would silently
      # override those three modules' defaults too, so this is scoped to
      # infra/dns only, same pattern as above.
      - name: Set rg_name for infra/dns
        if: inputs.working_directory == 'infra/dns'
        run: echo "TF_VAR_rg_name=${{ secrets.RESOURCE_GROUP_NAME }}" >> "$GITHUB_ENV"

      - name: Read pinned Terraform version
        id: tfversion
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfversion.outputs.version }}

      - name: Terraform Version
        working-directory: ${{ inputs.working_directory }}
        run: terraform version

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          if [ -n "${{ inputs.ssh_source_ip }}" ]; then
            terraform plan -var="ssh_source_ip=${{ inputs.ssh_source_ip }}" -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Terraform Apply
        if: inputs.apply == true
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan
