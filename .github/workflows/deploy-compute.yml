name: Deploy Compute

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Applying the changes'
        type: boolean
        default: false
  workflow_call:
    inputs:
      apply:
        required: false
        type: boolean
        default: false
  push:
    paths:
      - 'compute/vm/**'
      - '.github/workflows/deploy-compute.yml'

jobs:
  terraform:
    name: Terraform Compute
    uses: ./.github/workflows/_terraform.yml
    secrets: inherit
    with:
      working_directory: compute/vm
      apply: ${{ inputs.apply == true }}
